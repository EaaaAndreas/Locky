<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Locky{% endblock %} — Smart Skabsstyring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>

<!-- ── NAV ─────────────────────────────────────────────────── -->
{% if session.get('user') %}
<nav>
  <div class="nav-logo">
    <div class="lock-icon">🔒</div>
    <span>Locky</span>
  </div>
  <div class="nav-links">
    <a href="{{ url_for('booking') }}">
      <button class="{% if request.endpoint == 'booking' %}active{% endif %}">Booking</button>
    </a>
    <a href="{{ url_for('manage_skab') }}">
      <button class="{% if request.endpoint == 'manage_skab' %}active{% endif %}">Mit Skab</button>
    </a>
  </div>
  <div class="nav-user">
    <div class="avatar">{{ session['user'][:2].upper() }}</div>
    <div class="username">{{ session['user'] }}</div>
    <a href="{{ url_for('logout') }}">
      <button class="btn btn-secondary" style="padding:.35rem .8rem;font-size:.75rem;font-family:var(--font-mono)">Log ud</button>
    </a>
  </div>
</nav>
{% endif %}

<!-- ── TOAST ───────────────────────────────────────────────── -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="toast show {% if messages[0][0] == 'error' %}error{% else %}success{% endif %}" id="toast">
      <div class="toast-dot"></div>
      <span>{{ messages[0][1] }}</span>
    </div>
    <script>setTimeout(() => document.getElementById('toast').classList.remove('show'), 2800);</script>
  {% endif %}
{% endwith %}

{% block content %}{% endblock %}

</body>
</html>
