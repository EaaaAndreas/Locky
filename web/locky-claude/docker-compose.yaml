services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask
    security_opt:
      - no-new-privileges:true

  flask:
    build: ./backend
    expose:
      - "5000"
    volumes:
      - ./certs:/certs:ro
    env_file:
      - .env
    depends_on:
      - db
      - mosquitto
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  mosquitto:
    image: eclipse-mosquitto
    ports:
      - "8883:8883"             # eksponeres til netværket — controlleren connecter hertil
    volumes:
      - ./certs:/mosquitto/certs:ro
      - ./mosquitto:/mosquitto/config        # passwd og acl skal kunne skrives af mosquitto_passwd
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true

volumes:
  db_data:
